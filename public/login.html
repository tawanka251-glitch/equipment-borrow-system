<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Login - ระบบยืมคืนอุปกรณ์ มหาวิทยาลัย</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }
    .login-container {
      width: 100%;
      max-width: 440px;
      padding: 15px;
    }
    .brand-logo {
      display: block;
      margin: 0 auto 1.5rem;
      max-width: 100px;
      filter: drop-shadow(0 4px 6px rgba(99, 102, 241, 0.2));
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="text-center mb-4">
      <img src="https://upload.wikimedia.org/wikipedia/th/thumb/0/0d/Thaksin_University_Seal.svg/1200px-Thaksin_University_Seal.svg.png" class="brand-logo" alt="TSU Seal">
      <h3 class="fw-bold text-primary" style="background: var(--primary-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">TSU BORROW</h3>
      <p class="text-muted">ระบบยืมคืนอุปกรณ์ มหาวิทยาลัยทักษิณ</p>
    </div>
    <div class="card shadow-lg">
      <div class="card-body p-4">
        <h4 class="mb-4 text-center fw-semibold">เข้าสู่ระบบ</h4>
        <form id="loginForm">
          <div class="mb-3">
            <label class="form-label fw-medium">อีเมล (Email)</label>
            <input type="email" id="email" class="form-control" placeholder="example@tsu.ac.th" required autocomplete="email">
          </div>
          <div class="mb-4">
            <label class="form-label fw-medium">รหัสผ่าน (Password)</label>
            <input type="password" id="password" class="form-control" placeholder="••••••••" required autocomplete="current-password">
          </div>
          <button class="btn btn-primary w-100 py-2.5" type="submit">เข้าสู่ระบบ</button>
        </form>
        <hr class="my-4" style="opacity: 0.1;">
        <div class="text-center">
          <span class="text-muted small">ยังไม่มีบัญชีใช่หรือไม่?</span>
          <a href="register.html" class="text-decoration-none fw-semibold ms-1 small" style="color: #4f46e5;">สมัครสมาชิก</a>
        </div>
      </div>
    </div>
  </div>
  <script src="js/login.js"></script>
</body>
</html>
