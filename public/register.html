<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Register - ระบบยืมคืนอุปกรณ์ มหาวิทยาลัย</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }
    .register-container {
      width: 100%;
      max-width: 480px;
      padding: 15px;
    }
    .brand-logo {
      display: block;
      margin: 0 auto 1.5rem;
      max-width: 90px;
      filter: drop-shadow(0 4px 6px rgba(99, 102, 241, 0.2));
    }
  </style>
</head>
<body>
  <div class="register-container">
    <div class="text-center mb-4">
      <img src="https://upload.wikimedia.org/wikipedia/th/thumb/0/0d/Thaksin_University_Seal.svg/1200px-Thaksin_University_Seal.svg.png" class="brand-logo" alt="TSU Seal">
      <h4 class="fw-bold text-primary" style="background: var(--primary-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">สมัครสมาชิกใหม่</h4>
      <p class="text-muted small">ร่วมเป็นส่วนหนึ่งของระบบจัดการอุปกรณ์ มหาวิทยาลัยทักษิณ</p>
    </div>
    <div class="card shadow-lg">
      <div class="card-body p-4">
        <form id="registerForm">
          <div class="mb-3">
            <label class="form-label fw-medium">ชื่อ-นามสกุล (Full Name)</label>
            <input type="text" id="name" class="form-control" placeholder="สมชาย ใจดี" required>
          </div>
          <div class="mb-3">
            <label class="form-label fw-medium">อีเมล (Email)</label>
            <input type="email" id="email" class="form-control" placeholder="student@tsu.ac.th" required>
          </div>
          <div class="mb-4">
            <label class="form-label fw-medium">รหัสผ่าน (Password)</label>
            <input type="password" id="password" class="form-control" placeholder="รหัสผ่านอย่างน้อย 6 ตัวอักษร" required minlength="6">
          </div>
          <button class="btn btn-success w-100 py-2.5" type="submit">สมัครสมาชิก</button>
        </form>
        <div id="registerError" class="text-danger mt-3 text-center small fw-semibold"></div>
        <hr class="my-4" style="opacity: 0.1;">
        <div class="text-center">
          <span class="text-muted small">มีบัญชีอยู่แล้ว?</span>
          <a href="login.html" class="text-decoration-none fw-semibold ms-1 small" style="color: #059669;">เข้าสู่ระบบ</a>
        </div>
      </div>
    </div>
  </div>
  <script>
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      document.getElementById('registerError').textContent = '';
      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      
      try {
        const res = await fetch('/api/auth/register', {
          method: 'POST', 
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password })
        });
        const data = await res.json();
        if (res.ok) {
          alert('สมัครสมาชิกสำเร็จเรียบร้อยแล้ว');
          location.href = 'login.html';
        } else {
          const message = data.error || 'เกิดข้อผิดพลาดในการสมัครสมาชิก';
          const detail = data.detail ? ' (' + data.detail + ')' : '';
          document.getElementById('registerError').textContent = message + detail;
        }
      } catch (err) {
        document.getElementById('registerError').textContent = 'ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้';
      }
    });
  </script>
</body>
</html>
