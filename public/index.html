<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ระบบยืมคืนอุปกรณ์ มหาวิทยาลัยทักษิณ</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      overflow: hidden;
    }
    .landing-card {
      max-width: 460px;
      width: 100%;
      padding: 15px;
    }
    .brand-logo {
      width: 120px;
      filter: drop-shadow(0 8px 16px rgba(99, 102, 241, 0.15));
      transition: var(--transition-smooth);
    }
    .brand-logo:hover {
      transform: scale(1.05) rotate(5deg);
    }
  </style>
</head>
<body>

  <div class="landing-card">
    <div class="card border-0 shadow-lg text-center p-5">
      <div class="card-body">
        
        <!-- Logo -->
        <img src="https://upload.wikimedia.org/wikipedia/th/thumb/0/0d/Thaksin_University_Seal.svg/1200px-Thaksin_University_Seal.svg.png" 
             class="brand-logo mb-4" alt="Thaksin University Seal">

        <!-- Title -->
        <h2 class="fw-bold mb-1" style="background: var(--primary-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">ระบบยืมคืนอุปกรณ์</h2>
        <h5 class="fw-semibold text-secondary mb-4">มหาวิทยาลัยทักษิณ</h5>
        
        <p class="text-muted small mb-4">
          ยินดีต้อนรับสู่ระบบจัดการคลังและยืม-คืนอุปกรณ์ออนไลน์สำหรับนิสิตและบุคลากร มหาวิทยาลัยทักษิณ
        </p>

        <!-- Actions -->
        <div class="d-flex flex-column gap-2.5">
          <a href="login.html" class="btn btn-primary py-2.5 w-100 fw-bold">
            🔑 เข้าสู่ระบบด้วยบัญชี (Login)
          </a>
          <a href="register.html" class="btn btn-light py-2.5 w-100 border text-dark fw-semibold">
            📝 สมัครสมาชิกใหม่ (Register)
          </a>
          
          <div class="position-relative my-3">
            <hr class="text-muted" style="opacity: 0.15;">
            <span class="position-absolute top-50 start-50 translate-middle bg-white px-3 text-muted small" style="font-size: 0.75rem;">ทดลองใช้งานด่วน (Demo Bypass)</span>
          </div>

          <div class="row g-2">
            <div class="col-6">
              <button onclick="demoUserLogin()" class="btn btn-primary w-100 py-2.5 fw-semibold text-white" style="background: var(--secondary-gradient);">
                👤 Demo User
              </button>
            </div>
            <div class="col-6">
              <button onclick="demoAdminLogin()" class="btn btn-danger w-100 py-2.5 fw-semibold text-white" style="background: var(--danger-gradient);">
                🔴 Demo Admin
              </button>
            </div>
          </div>
        </div>

        <div class="mt-4 pt-2">
          <small class="text-muted" style="font-size: 0.7rem;">&copy; 2026 Thaksin University. All rights reserved.</small>
        </div>

      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    async function demoUserLogin() {
      try {
        const res = await fetch('/api/auth/demo', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ role: 'user' })
        });
        const data = await res.json();
        if (res.ok) {
          localStorage.setItem('token', data.token);
          localStorage.setItem('user', JSON.stringify(data.user));
          window.location.href = 'equipment.html';
        }
      } catch (err) {
        alert('ไม่สามารถดึงข้อมูลเดโมได้');
      }
    }

    async function demoAdminLogin() {
      try {
        const res = await fetch('/api/auth/demo', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ role: 'admin' })
        });
        const data = await res.json();
        if (res.ok) {
          localStorage.setItem('token', data.token);
          localStorage.setItem('user', JSON.stringify(data.user));
          window.location.href = 'dashboard.html';
        }
      } catch (err) {
        alert('ไม่สามารถดึงข้อมูลเดโมได้');
      }
    }
  </script>
</body>
</html>
