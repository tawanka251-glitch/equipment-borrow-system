version: '3.8'

services:
  app:
    build: .
    container_name: g04_app
    networks:
      - course_proxy
      - appnetwork
    ports:
      - "3000:3000"
    environment:
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=root
      - DB_NAME=wab_borrow_return
    depends_on:
      - db

  db:
    image: mysql:8.0
    restart: always
    container_name: g04_db
    networks:
      - appnetwork
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: wab_borrow_return
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
networks:
  course_proxy:
    external: true
  appnetwork:
    driver: bridge